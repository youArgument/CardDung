server {
    listen 80;
    server_name game.you-argument.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name game.you-argument.ru;

    ssl_certificate /etc/letsencrypt/live/game.you-argument.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/game.you-argument.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # API → Express server (cards CRUD, game state)
    location /api/ {
        proxy_pass http://carddung-server:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Admin panel → admin app
    location /admin/ {
        proxy_pass http://admin:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # PWA frontend (default)
    location / {
        proxy_pass http://carddung:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}