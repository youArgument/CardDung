<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1a1a1a">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; worker-src 'self'; script-src 'self' 'unsafe-inline';">
   <title>Dungeon•Elden•Souls</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <!-- Menu Screen -->
    <div id="menu-screen" class="screen active">
      <div class="menu-content">
         <h1 class="game-title" data-i18n="menu.title"></h1>
         <div class="menu-subtitle" data-i18n="menu.subtitle"></div>
        <div id="app-version" class="menu-version"></div>
        <div class="lang-selector">
          <button id="btn-lang-en" class="btn-lang active">EN</button>
          <button id="btn-lang-ru" class="btn-lang">RU</button>
        </div>
        <div id="menu-dynamic" class="menu-dynamic"></div>
      </div>
    </div>

    <!-- Hub Screen (4 large cards) -->
    <div id="hub-screen" class="screen">
      <div class="hub-header">
        <div class="hub-gold"><span class="res-icon">◆</span><span id="hub-gold">0</span></div>
        <button id="btn-hub-menu" class="btn-back" data-i18n="hub.back"></button>
      </div>
      <div class="hub-grid" id="hub-grid">
        <!-- Card 1: Black Market -->
        <div class="hub-card" id="hub-market" data-panel="market">
          <div class="hub-card-icon">💰</div>
          <div class="hub-card-title" data-i18n="hub.market"></div>
          <div class="hub-card-desc" data-i18n="hub.market_desc"></div>
        </div>
        <!-- Card 2: Deck/Storage -->
        <div class="hub-card" id="hub-deck" data-panel="deck">
          <div class="hub-card-icon">🗃️</div>
          <div class="hub-card-title" data-i18n="hub.deck"></div>
          <div class="hub-card-desc" data-i18n="hub.deck_desc"></div>
        </div>
        <!-- Card 3: Safehouse/Upgrades -->
        <div class="hub-card" id="hub-safehouse" data-panel="safehouse">
          <div class="hub-card-icon">🕯️</div>
          <div class="hub-card-title" data-i18n="hub.safehouse"></div>
          <div class="hub-card-desc" data-i18n="hub.safehouse_desc"></div>
        </div>
        <!-- Card 4: Enter Dungeon -->
        <div class="hub-card hub-card-dungeon" id="hub-dungeon" data-panel="dungeon">
          <div class="hub-card-icon">🚪</div>
          <div class="hub-card-title" data-i18n="hub.descent"></div>
          <div class="hub-card-desc" data-i18n="hub.descent_desc"></div>
        </div>
      </div>
    </div>

    <!-- Hub Panels (overlay) -->
    <div id="panel-market" class="hub-panel hidden">
      <div class="panel-header">
        <button class="btn-panel-back" data-i18n="hub.back"></button>
        <h2>💰 <span data-i18n="hub.market"></span></h2>
        <div class="panel-gold">◆ <span id="panel-gold">0</span></div>
      </div>
      <div class="panel-content" id="market-list"></div>
    </div>

    <div id="panel-deck" class="hub-panel hidden">
      <div class="panel-header">
        <button class="btn-panel-back" data-i18n="hub.back"></button>
        <h2>🗃️ <span data-i18n="hub.deck"></span></h2>
        <div class="panel-info" id="deck-count-label"></div>
      </div>
      <div class="panel-content">
        <div class="deck-section">
          <h3 data-i18n="deck.active"></h3>
          <div class="deck-grid" id="deck-active"></div>
        </div>
        <div class="deck-section">
          <h3 data-i18n="deck.collection"></h3>
          <div class="deck-grid" id="deck-collection"></div>
        </div>
      </div>
    </div>

    <div id="panel-safehouse" class="hub-panel hidden">
      <div class="panel-header">
        <button class="btn-panel-back" data-i18n="hub.back"></button>
        <h2>🕯️ <span data-i18n="hub.safehouse"></span></h2>
        <div class="panel-gold">◆ <span id="panel-gold-safe">0</span></div>
      </div>
      <div class="panel-content" id="upgrade-list"></div>
    </div>

    <!-- Dungeon Screen -->
    <div id="dungeon-screen" class="screen">
      <!-- Room Progress Bar -->
      <div class="room-progress-bar">
        <div class="room-progress-fill" id="room-progress-fill"></div>
        <span class="room-progress-text" id="room-progress">Room 1/2</span>
      </div>

      <div class="hud-top">
        <div class="hud-player">
          <span id="hp-text" class="hp-text">❤ 8/8</span>
          <span class="armor-badge" id="armor-badge">🛡4</span>
          <span class="stamina-badge" id="stamina-badge">⚡100</span>
        </div>
        <div class="hud-resources">
          <span class="resource gold">◆<span id="gold-val">0</span></span>
        </div>
      </div>

      <div class="dungeon-grid" id="dungeon-grid"></div>
      <div class="hand-container" id="hand-container"></div>
    </div>

    <!-- Reward Screen -->
    <div id="reward-screen" class="screen">
      <div class="reward-content">
        <h2 class="reward-title" id="reward-title"></h2>
        <div class="reward-gold" id="reward-gold"></div>
        <div class="reward-cards" id="reward-cards"></div>
        <button id="btn-reward-done" class="btn-primary hidden" data-i18n="reward.continue"></button>
      </div>
    </div>

    <!-- Game Over Screen -->
    <div id="gameover-screen" class="screen">
      <div class="gameover-content">
        <h2 id="gameover-title" data-i18n="gameover.title"></h2>
        <div class="gameover-stats">
          <div class="stat-row"><span data-i18n="escape.floor"></span>: <span id="go-floor">0</span></div>
          <div class="stat-row"><span data-i18n="gameover.revealed"></span>: <span id="go-revealed">0</span></div>
          <div class="stat-row"><span data-i18n="gameover.kills"></span>: <span id="go-kills">0</span></div>
        </div>
        <button id="btn-go-hub" class="btn-primary" data-i18n="gameover.back_hub"></button>
      </div>
    </div>

    <!-- Escape Screen -->
    <div id="escape-screen" class="screen">
      <div class="escape-content">
        <h2 data-i18n="escape.title"></h2>
        <div class="escape-stats">
          <div class="stat-row"><span data-i18n="escape.floor"></span>: <span id="esc-floor">0</span></div>
          <div class="stat-row"><span data-i18n="escape.gold"></span>: <span id="esc-gold">0</span></div>
          <div class="stat-row"><span data-i18n="escape.hp"></span>: <span id="esc-hp">0</span></div>
        </div>
        <button id="btn-escape-hub" class="btn-primary" data-i18n="escape.back_hub"></button>
      </div>
    </div>

    <!-- Update Available Banner -->
    <div id="update-banner" class="update-banner hidden">
      <span data-i18n="update.available"></span>
      <button id="btn-update-reload" class="btn-update" data-i18n="update.button"></button>
    </div>

    <!-- Exit Door Popup -->
    <div id="exit-popup" class="card-popup hidden">
      <div class="popup-content">
        <div class="popup-sprite">🚪</div>
        <div class="popup-name" id="exit-popup-title"></div>
        <div class="popup-desc" id="exit-popup-desc"></div>
        <div class="popup-actions">
          <button id="btn-exit-continue" class="btn-primary"></button>
          <button id="btn-exit-hub" class="btn-secondary" data-i18n="exit.to_hub"></button>
        </div>
      </div>
    </div>

    <!-- Rest Popup (between rooms) -->
    <div id="rest-popup" class="card-popup hidden">
      <div class="popup-content">
        <div class="popup-sprite">⛺</div>
        <div class="popup-name" id="rest-popup-title"></div>
        <div class="popup-desc" id="rest-popup-desc"></div>
        <div class="popup-actions">
          <button id="btn-rest-yes" class="popup-btn add" data-i18n="rest.yes"></button>
          <button id="btn-rest-no" class="popup-btn close" id="rest-no-text"></button>
        </div>
      </div>
    </div>

    <!-- Class Change Confirmation -->
    <div id="class-confirm-popup" class="card-popup hidden">
      <div class="popup-content">
        <div class="popup-sprite">⚠️</div>
        <div class="popup-name" id="confirm-title">Change Class?</div>
        <div class="popup-desc" id="confirm-desc">All progress will be reset!</div>
        <div class="popup-actions">
          <button id="btn-confirm-yes" class="popup-btn add">YES</button>
          <button id="btn-confirm-no" class="popup-btn close">CANCEL</button>
        </div>
      </div>
    </div>

    <!-- Card Detail Popup (long-press) -->
    <div id="card-popup" class="card-popup hidden">
      <div class="popup-content">
        <div class="popup-sprite" id="popup-sprite"></div>
        <div class="popup-name" id="popup-name"></div>
        <div class="popup-desc" id="popup-desc"></div>
        <div class="popup-stats" id="popup-stats"></div>
        <div class="popup-actions" id="popup-actions"></div>
      </div>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
